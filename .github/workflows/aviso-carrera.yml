name: Aviso 10 min antes de carrera

on:
  schedule:
    # Cada 5 minutos, viernes/sábado/domingo, entre las 04:00 y 20:00 UTC
    # (cubre todas las franjas horarias de carreras de F1 y MotoGP).
    # Nota: el cron de GitHub Actions puede retrasarse algunos minutos cuando
    # hay mucha carga; por eso el script avisa con una ventana de 12 min.
    - cron: "*/5 4-20 * * 5,6,0"
  workflow_dispatch: {}

# Necesario para que el job pueda hacer commit del estado de avisos enviados.
permissions:
  contents: write

# Evita que dos ejecuciones se solapen y pisen el commit del estado.
concurrency:
  group: aviso-carrera
  cancel-in-progress: false

jobs:
  aviso:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Comprobar carreras inminentes
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_race_alert.py
      - name: Guardar estado si hubo aviso
        run: |
          if ! git diff --quiet -- data/alerted.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/alerted.json
            git commit -m "chore: registrar aviso de carrera enviado"
            git push
          else
            echo "Sin cambios en el estado; no se hace commit."
          fi
